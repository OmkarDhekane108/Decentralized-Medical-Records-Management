<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Medical Records</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h2>Medical Records Login</h2>
        <form id="loginForm">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username" required>

            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" required>

            <label>Login As</label>
            <select id="role">
                <option value="Patient">Patient</option>
                <option value="Doctor">Doctor</option>
                <option value="Admin">Admin</option>
            </select>

            <button type="submit">Login</button>
            <p id="errorMsg" style="color: red; display: none; margin-top: 10px;"></p>
        </form>
    </div>

    <script>
        // Demo hardcoded credentials (matches Authentication.java)
        const USERS = {
            "patient1": { password: "patient123", role: "Patient" },
            "patient2": { password: "patient123", role: "Patient" },
            "doctor1":  { password: "doctor123",  role: "Doctor" },
            "admin1":   { password: "admin123",   role: "Admin" }
        };

        const DASHBOARD_BY_ROLE = {
            "Patient": "patient-dashboard.html",
            "Doctor": "doctor-dashboard.html",
            "Admin": "admin-dashboard.html"
        };

        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const role = document.getElementById("role").value;
            const errorMsg = document.getElementById("errorMsg");

            const user = USERS[username];
            if (user && user.password === password && user.role === role) {
                localStorage.setItem("loggedInUser", username);
                localStorage.setItem("loggedInRole", role);
                window.location.href = DASHBOARD_BY_ROLE[role];
            } else {
                errorMsg.textContent = "Invalid username, password, or role.";
                errorMsg.style.display = "block";
            }
        });
    </script>
</body>
</html>
