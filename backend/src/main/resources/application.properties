spring.application.name=medvault-backend
server.port=${PORT:8080}

# --- Demo database: in-memory H2, resets on every restart ---
spring.datasource.url=jdbc:h2:mem:medvault;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Production database: swap the block above for this once you have a real
#     Postgres instance (Render/Railway/Supabase all give you a connection URL) ---
# spring.datasource.url=${DATABASE_URL}
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=${DB_USER}
# spring.datasource.password=${DB_PASSWORD}
# spring.jpa.hibernate.ddl-auto=validate

# --- IPFS node the backend will pin records to ---
ipfs.api-url=${IPFS_API_URL:http://127.0.0.1:5001}
