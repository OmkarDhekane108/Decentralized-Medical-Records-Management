<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Medical Records</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h2>Medical Records Login</h2>
        <form id="loginForm">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username" required>

            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" required>

            <label>Login As</label>
            <select id="role">
                <option value="PATIENT">Patient</option>
                <option value="DOCTOR">Doctor</option>
                <option value="ADMIN">Admin</option>
            </select>

            <button type="submit" id="loginBtn">Login</button>
            <p id="errorMsg" style="color: red; display: none; margin-top: 10px;"></p>
        </form>
    </div>

    <script src="api-client.js"></script>
    <script>
        const DASHBOARD_BY_ROLE = {
            "PATIENT": "patient-dashboard.html",
            "DOCTOR": "doctor-dashboard.html",
            "ADMIN": "admin-dashboard.html"
        };

        document.getElementById("loginForm").addEventListener("submit", async function (e) {
            e.preventDefault();
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const role = document.getElementById("role").value;
            const errorMsg = document.getElementById("errorMsg");
            const btn = document.getElementById("loginBtn");

            errorMsg.style.display = "none";
            btn.disabled = true;
            btn.textContent = "Logging in...";

            try {
                const res = await apiLogin(username, password, role);
                localStorage.setItem("mc_token", res.token);
                localStorage.setItem("mc_username", res.username);
                localStorage.setItem("mc_role", res.role);
                localStorage.setItem("mc_fullName", res.fullName || res.username);
                window.location.href = DASHBOARD_BY_ROLE[res.role.toUpperCase()];
            } catch (err) {
                errorMsg.textContent = err.message || "Login failed. Is the backend server running on localhost:8080?";
                errorMsg.style.display = "block";
                btn.disabled = false;
                btn.textContent = "Login";
            }
        });
    </script>
</body>
</html>
